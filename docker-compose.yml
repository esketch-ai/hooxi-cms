version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hooxi_cms_db
    environment:
      POSTGRES_USER: ${DB_USER:-hooxi}
      # 약한 기본 비밀번호 제거 — .env에 DB_PASSWORD를 반드시 설정 (미설정 시 기동 실패)
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD를 .env에 설정하세요}
      POSTGRES_DB: ${DB_NAME:-hooxi_cms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hooxi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (with static frontend files)
  backend:
    build: .
    container_name: hooxi_cms_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hooxi}:${DB_PASSWORD:?DB_PASSWORD를 .env에 설정하세요}@postgres:5432/${DB_NAME:-hooxi_cms}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hooxi_cms}
      DB_USER: ${DB_USER:-hooxi}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD를 .env에 설정하세요}
      # JWT 서명키 필수(프로덕션 기동 가드와 정합). 로컬 풀스택 개발이라 dev-login 기본 허용.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET를 .env에 설정하세요}
      ENABLE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-true}
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (for development only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hooxi_cms_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
