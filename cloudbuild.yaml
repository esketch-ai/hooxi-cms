steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/hooxi-cms:$BUILD_NUMBER', '.']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'hooxi-cms',
      '--image', 'gcr.io/$PROJECT_ID/hooxi-cms:$BUILD_NUMBER',
      '--platform', 'managed',
      '--region', 'asia-northeast1',
      '--allow-unauthenticated']
images:
  - 'gcr.io/$PROJECT_ID/hooxi-cms:$BUILD_NUMBER'
